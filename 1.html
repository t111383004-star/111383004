<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韌木重構 - 疏伐材循環家具力學模擬面板</title>
    <style>
        :root {
            --primary: #8B5A2B;
            --wood-light: #DEB887;
            --wood-dark: #A0522D;
            --bg-color: #FDF5E6;
            --safe: #4CAF50;
            --warn: #FFC107;
            --danger: #F44336;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .showcase {
            text-align: center;
            margin-bottom: 30px;
        }
        .showcase img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border: 4px solid #fff;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
            display: flex;
            flex-direction: column;
        }
        .card h2 {
            font-size: 1.3em;
            margin-top: 0;
            color: var(--primary);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        /* 動畫視覺區 */
        .anim-viewport {
            height: 140px;
            background: #f4f4f4;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .control-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
            cursor: pointer;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        .value-display {
            font-size: 0.85em;
            color: #666;
            float: right;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .result-box {
            margin-top: auto;
            padding: 15px;
            border-radius: 5px;
            background: #f9f9f9;
            text-align: center;
            font-weight: bold;
            transition: background 0.3s;
        }
        .status-bar {
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
            background: #eee;
            overflow: hidden;
        }
        .status-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            font-size: 1em;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        button.action-btn:hover { background: var(--wood-dark); }

        /* 特效元件樣式 */
        .wood-element { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* 剪力動畫專用 */
        .shear-top { width: 100px; height: 40px; background: var(--wood-light); border: 2px solid var(--wood-dark); position: absolute; top: 30px; transition: transform 0.3s; z-index: 2; border-radius: 4px; }
        .shear-bottom { width: 100px; height: 40px; background: var(--wood-light); border: 2px solid var(--wood-dark); position: absolute; top: 70px; z-index: 2; border-radius: 4px; }
        .shear-dowel { width: 12px; height: 40px; background: #6d4c41; position: absolute; top: 50px; z-index: 1; transition: transform 0.3s, background 0.3s; }
        
        /* 拉力動畫專用 */
        .tension-wood { width: 120px; height: 60px; background: var(--wood-light); border-top: 3px solid var(--wood-dark); position: absolute; bottom: 10px; }
        .tension-hinge { width: 60px; height: 10px; background: #9e9e9e; position: absolute; bottom: 70px; transition: transform 0.3s; border-radius: 2px; }
        .tension-screw { width: 8px; height: 30px; background: #757575; position: absolute; bottom: 40px; transition: transform 0.3s; }
        .tension-crack { position: absolute; bottom: 50px; color: red; font-weight: bold; font-size: 20px; opacity: 0; transition: opacity 0.3s; }

        /* 扭力動畫專用 */
        .torsion-side { width: 20px; height: 100px; background: var(--wood-dark); position: absolute; left: 80px; }
        .torsion-door { width: 100px; height: 12px; background: var(--wood-light); position: absolute; left: 100px; top: 40px; transform-origin: left center; transition: transform 0.3s; }
        .torsion-hinge-dot { width: 14px; height: 14px; border-radius: 50%; background: #ccc; position: absolute; left: 93px; top: 39px; transition: background 0.3s, box-shadow 0.3s; z-index: 3;}
        
        /* 衝擊動畫專用 */
        .impact-ball { width: 30px; height: 30px; border-radius: 50%; background: #607d8b; position: absolute; top: 10px; z-index: 2; transition: top 0.1s linear; }
        .impact-plank { width: 160px; height: 15px; background: var(--wood-light); position: absolute; bottom: 40px; border-radius: 5px; transform-origin: center; transition: transform 0.1s linear, background 0.2s; }
        
        /* 掉落動畫 Keyframes */
        @keyframes dropAnim {
            0% { top: 10px; }
            40% { top: 70px; }
            50% { top: 85px; } /* Hit */
            80% { top: 60px; } /* Bounce */
            100% { top: 70px; } /* Rest */
        }
        @keyframes plankBendAnim {
            0% { transform: scaleY(1) translateY(0); }
            40% { transform: scaleY(1) translateY(0); }
            50% { transform: scaleY(0.7) translateY(10px); }
            70% { transform: scaleY(1.1) translateY(-2px); }
            100% { transform: scaleY(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>韌木重構｜疏伐材循環家具力學模擬面板</h1>
        <p>互動式結構驗證：探討台灣杉等國產疏伐材在模組化設計中的力學表現</p>
    </div>

    <div class="showcase">
        <img src="Enscape_2026-03-04-20-40-50.jpg" alt="韌木重構 3D渲染圖" onerror="this.style.display='none'">
    </div>

    <div class="grid-container">
        
        <div class="card">
            <h2>🧱 1. 側板抗壓 (Buckling)</h2>
            <div class="anim-viewport">
                <svg width="60" height="120" viewBox="0 0 60 120">
                    <path id="buckle-path" class="wood-element" d="M30 10 Q30 60 30 110" stroke="var(--wood-light)" stroke-width="15" stroke-linecap="round" fill="none" />
                </svg>
            </div>
            <div class="control-group">
                <label>木材種類</label>
                <select id="p-wood" onchange="calcPressure()">
                    <option value="5000">台灣杉 (彈性模數較低)</option>
                    <option value="7000">柳杉 (彈性模數中等)</option>
                    <option value="12000">實木補強 (彈性模數高)</option>
                </select>
            </div>
            <div class="control-group">
                <label>上方負載 <span id="p-load-val" class="value-display">50 kg</span></label>
                <input type="range" id="p-load" min="0" max="300" value="50" oninput="calcPressure()">
            </div>
            <div class="control-group">
                <label>側板厚度 <span id="p-thick-val" class="value-display">15 mm</span></label>
                <input type="range" id="p-thick" min="9" max="30" value="15" oninput="calcPressure()">
            </div>
            <div class="result-box" id="p-result">狀態載入中...</div>
            <div class="status-bar"><div class="status-fill" id="p-bar"></div></div>
        </div>

        <div class="card">
            <h2>📏 2. 層板下撓度 (Bending)</h2>
            <div class="anim-viewport">
                <svg width="240" height="100" viewBox="0 0 240 100">
                    <rect x="20" y="30" width="10" height="40" fill="#ccc" />
                    <rect x="210" y="30" width="10" height="40" fill="#ccc" />
                    <path id="bend-path" class="wood-element" d="M25 35 Q120 35 215 35" stroke="var(--wood-light)" stroke-width="12" stroke-linecap="round" fill="none" />
                    <circle cx="120" cy="15" r="12" fill="#607d8b" />
                    <path d="M120 15 L120 30" stroke="#607d8b" stroke-width="3" />
                    <polygon points="115,25 125,25 120,32" fill="#607d8b" />
                </svg>
            </div>
            <div class="control-group">
                <label>木材種類</label>
                <select id="b-wood" onchange="calcBending()">
                    <option value="5000">台灣杉</option>
                    <option value="7000">柳杉</option>
                    <option value="12000">實木補強</option>
                </select>
            </div>
            <div class="control-group">
                <label>集中載重 <span id="b-load-val" class="value-display">30 kg</span></label>
                <input type="range" id="b-load" min="0" max="100" value="30" oninput="calcBending()">
            </div>
            <div class="control-group">
                <label>層板跨距 <span id="b-span-val" class="value-display">800 mm</span></label>
                <input type="range" id="b-span" min="400" max="1200" value="800" step="50" oninput="calcBending()">
            </div>
            <div class="result-box" id="b-result">狀態載入中...</div>
            <div class="status-bar"><div class="status-fill" id="b-bar"></div></div>
        </div>

        <div class="card">
            <h2>🪚 3. 堆疊木榫抗剪 (Shear)</h2>
            <div class="anim-viewport">
                <div id="shear-top" class="shear-top"></div>
                <div id="shear-dowel" class="shear-dowel"></div>
                <div class="shear-bottom"></div>
            </div>
            <div class="control-group">
                <label>側向推力 <span id="s-load-val" class="value-display">20 kg</span></label>
                <input type="range" id="s-load" min="0" max="100" value="20" oninput="calcShear()">
            </div>
            <div class="control-group">
                <label>木榫直徑 <span id="s-dia-val" class="value-display">8 mm</span></label>
                <input type="range" id="s-dia" min="5" max="15" value="8" oninput="calcShear()">
            </div>
            <div class="control-group">
                <label>木榫數量 <span id="s-num-val" class="value-display">4 個</span></label>
                <input type="range" id="s-num" min="2" max="8" value="4" oninput="calcShear()">
            </div>
            <div class="result-box" id="s-result">狀態載入中...</div>
            <div class="status-bar"><div class="status-fill" id="s-bar"></div></div>
        </div>

        <div class="card">
            <h2>🔩 4. 鉸鏈螺絲拔出力 (Tension)</h2>
            <div class="anim-viewport">
                <div id="tension-hinge" class="tension-hinge"></div>
                <div id="tension-screw" class="tension-screw"></div>
                <div class="tension-wood"></div>
                <div id="tension-crack" class="tension-crack">⚡ 破裂</div>
            </div>
            <div class="control-group">
                <label>木材比重 (密度)</label>
                <select id="t-wood" onchange="calcTension()">
                    <option value="0.35">台灣杉 (0.35 - 偏鬆軟)</option>
                    <option value="0.40">柳杉 (0.40 - 中等)</option>
                    <option value="0.65">硬木預埋件 (0.65 - 堅實)</option>
                </select>
            </div>
            <div class="control-group">
                <label>瞬間拉扯力 <span id="t-load-val" class="value-display">15 kg</span></label>
                <input type="range" id="t-load" min="0" max="60" value="15" oninput="calcTension()">
            </div>
            <div class="control-group">
                <label>螺絲埋入深度 <span id="t-depth-val" class="value-display">12 mm</span></label>
                <input type="range" id="t-depth" min="8" max="25" value="12" oninput="calcTension()">
            </div>
            <div class="result-box" id="t-result">狀態載入中...</div>
            <div class="status-bar"><div class="status-fill" id="t-bar"></div></div>
        </div>

        <div class="card">
            <h2>🚪 5. 門片極端扭矩 (Torsion)</h2>
            <div class="anim-viewport">
                <div class="torsion-side"></div>
                <div id="torsion-hinge" class="torsion-hinge-dot"></div>
                <div id="torsion-door" class="torsion-door"></div>
            </div>
            <div class="control-group">
                <label>邊緣下壓重量 <span id="to-load-val" class="value-display">15 kg</span></label>
                <input type="range" id="to-load" min="0" max="50" value="15" oninput="calcTorsion()">
            </div>
            <div class="control-group">
                <label>門片寬度 (力臂) <span id="to-width-val" class="value-display">400 mm</span></label>
                <input type="range" id="to-width" min="200" max="600" value="400" step="10" oninput="calcTorsion()">
            </div>
            <div class="control-group">
                <label>鉸鏈數量 <span id="to-num-val" class="value-display">2 個</span></label>
                <input type="range" id="to-num" min="2" max="4" value="2" oninput="calcTorsion()">
            </div>
            <div class="result-box" id="to-result">狀態載入中...</div>
            <div class="status-bar"><div class="status-fill" id="to-bar"></div></div>
        </div>

        <div class="card">
            <h2>💥 6. 動態衝擊緩衝 (Impact)</h2>
            <div class="anim-viewport">
                <div id="impact-ball" class="impact-ball"></div>
                <div id="impact-plank" class="impact-plank"></div>
            </div>
            <button class="action-btn" onclick="triggerImpact()">▶ 測試掉落</button>
            <div class="control-group">
                <label>掉落材質特性</label>
                <select id="i-mat" onchange="updateImpactData()">
                    <option value="5">疏伐軟木 (變形量大，吸收衝擊)</option>
                    <option value="15">堅硬木材 (變形量小，瞬間力高)</option>
                </select>
            </div>
            <div class="control-group">
                <label>掉落物體重量 <span id="i-load-val" class="value-display">20 kg</span></label>
                <input type="range" id="i-load" min="5" max="50" value="20" oninput="updateImpactData()">
            </div>
            <div class="control-group">
                <label>掉落高度 <span id="i-height-val" class="value-display">15 cm</span></label>
                <input type="range" id="i-height" min="0" max="50" value="15" oninput="updateImpactData()">
            </div>
            <div class="result-box" id="i-result">設定完成，請點擊測試</div>
            <div class="status-bar"><div class="status-fill" id="i-bar"></div></div>
        </div>

    </div>

    <script>
        // 核心 UI 更新函數
        function updateUI(id, valText, resultId, barId, fs, safeMsg, warnMsg, dangerMsg) {
            document.getElementById(id).innerText = valText;
            const resBox = document.getElementById(resultId);
            const bar = document.getElementById(barId);
            
            let percent = Math.min((1 / fs) * 100, 100);
            bar.style.width = percent + '%';

            if (fs > 1.5) {
                resBox.style.backgroundColor = '#e8f5e9';
                resBox.style.color = '#2e7d32';
                resBox.innerHTML = safeMsg;
                bar.style.backgroundColor = '#4CAF50';
                return 'safe';
            } else if (fs > 1) {
                resBox.style.backgroundColor = '#fff8e1';
                resBox.style.color = '#f57f17';
                resBox.innerHTML = warnMsg;
                bar.style.backgroundColor = '#FFC107';
                return 'warn';
            } else {
                resBox.style.backgroundColor = '#ffebee';
                resBox.style.color = '#c62828';
                resBox.innerHTML = dangerMsg;
                bar.style.backgroundColor = '#F44336';
                return 'danger';
            }
        }

        // 1. 壓力與挫曲動畫
        function calcPressure() {
            let E = parseFloat(document.getElementById('p-wood').value);
            let load = parseFloat(document.getElementById('p-load').value);
            let thick = parseFloat(document.getElementById('p-thick').value);
            
            let I = (400 * Math.pow(thick, 3)) / 12; 
            let L = 450; 
            let P_crit = (Math.pow(Math.PI, 2) * E * I) / Math.pow(L, 2) / 9.81; 
            let fs = (load === 0) ? 99 : P_crit / load;

            let status = updateUI('p-load-val', load + " kg", 'p-result', 'p-bar', fs,
                `✅ 安全 (FS: ${fs.toFixed(1)})<br>臨界: ${Math.round(P_crit)} kg`,
                `⚠️ 接近臨界 (FS: ${fs.toFixed(1)})`,
                `❌ 發生挫曲！(FS: ${fs.toFixed(1)})`
            );
            document.getElementById('p-thick-val').innerText = thick + " mm";

            // 動畫更新
            const path = document.getElementById('buckle-path');
            let bowX = 30;
            if(status === 'warn') bowX = 30 + ((1.5 - fs) * 20); // 微彎
            if(status === 'danger') bowX = 60; // 極限彎曲
            path.setAttribute('d', `M30 10 Q${bowX} 60 30 110`);
            path.setAttribute('stroke', status === 'danger' ? '#F44336' : 'var(--wood-light)');
            path.setAttribute('stroke-width', thick);
        }

        // 2. 彎矩動畫
        function calcBending() {
            let E = parseFloat(document.getElementById('b-wood').value);
            let load = parseFloat(document.getElementById('b-load').value);
            let span = parseFloat(document.getElementById('b-span').value);
            
            let I = (400 * Math.pow(15, 3)) / 12; 
            let deflection = (load * 9.81 * Math.pow(span, 3)) / (48 * E * I);
            let allow_def = span / 200;
            let fs = (deflection === 0) ? 99 : allow_def / deflection;

            let status = updateUI('b-load-val', load + " kg", 'b-result', 'b-bar', fs * 1.5,
                `✅ 安全<br>下撓: ${deflection.toFixed(1)} mm`,
                `⚠️ 變形明顯<br>下撓: ${deflection.toFixed(1)} mm`,
                `❌ 下陷過深<br>下撓: ${deflection.toFixed(1)} mm`
            );
            document.getElementById('b-span-val').innerText = span + " mm";

            // 動畫更新
            const path = document.getElementById('bend-path');
            // 將下撓度轉換為視覺像素 (適度放大以利觀察)
            let visualSag = 35 + Math.min(40, deflection * 2);
            if(status === 'danger') visualSag += 10;
            path.setAttribute('d', `M25 35 Q120 ${visualSag} 215 35`);
            path.setAttribute('stroke', status === 'danger' ? '#F44336' : 'var(--wood-light)');
        }

        // 3. 剪力動畫
        function calcShear() {
            let v = parseFloat(document.getElementById('s-load').value);
            let d = parseFloat(document.getElementById('s-dia').value);
            let n = parseFloat(document.getElementById('s-num').value);
            
            let area = n * Math.PI * Math.pow(d/2, 2);
            let stress = v / area;
            let allow_stress = 0.5; 
            let fs = (v === 0) ? 99 : allow_stress / stress;

            let status = updateUI('s-load-val', v + " kg", 's-result', 's-bar', fs,
                `✅ 安全 (FS: ${fs.toFixed(1)})<br>木榫穩固`,
                `⚠️ 臨界 (FS: ${fs.toFixed(1)})<br>推力過大`,
                `❌ 剪切斷裂！(FS: ${fs.toFixed(1)})`
            );
            document.getElementById('s-dia-val').innerText = d + " mm";
            document.getElementById('s-num-val').innerText = n + " 個";

            // 動畫更新
            const topBlock = document.getElementById('shear-top');
            const dowel = document.getElementById('shear-dowel');
            let offset = 0;
            let skew = 0;
            
            if(status === 'warn') { offset = 8; skew = 15; }
            if(status === 'danger') { offset = 20; skew = 45; }
            
            topBlock.style.transform = `translateX(${offset}px)`;
            dowel.style.transform = `translateX(${offset/2}px) skewX(${-skew}deg)`;
            dowel.style.background = status === 'danger' ? '#F44336' : '#6d4c41';
        }

        // 4. 拉力動畫
        function calcTension() {
            let G = parseFloat(document.getElementById('t-wood').value);
            let load = parseFloat(document.getElementById('t-load').value);
            let depth = parseFloat(document.getElementById('t-depth').value);

            let D = 3.5; 
            let max_pull = 12 * Math.pow(G, 2) * D * depth;
            let fs = (load === 0) ? 99 : max_pull / load;

            let status = updateUI('t-load-val', load + " kg", 't-result', 't-bar', fs,
                `✅ 螺絲穩固<br>極限: ${Math.round(max_pull)} kg`,
                `⚠️ 有滑牙風險<br>極限: ${Math.round(max_pull)} kg`,
                `❌ 木纖維碎裂，拔出！`
            );
            document.getElementById('t-depth-val').innerText = depth + " mm";

            // 動畫更新
            const hinge = document.getElementById('tension-hinge');
            const screw = document.getElementById('tension-screw');
            const crack = document.getElementById('tension-crack');
            
            let pullUp = 0;
            if(status === 'warn') pullUp = 5;
            if(status === 'danger') pullUp = 25;
            
            hinge.style.transform = `translateY(${-pullUp}px)`;
            screw.style.transform = `translateY(${-pullUp}px)`;
            crack.style.opacity = (status === 'danger') ? 1 : 0;
        }

        // 5. 扭力動畫
        function calcTorsion() {
            let f = parseFloat(document.getElementById('to-load').value);
            let d = parseFloat(document.getElementById('to-width').value);
            let n = parseFloat(document.getElementById('to-num').value);

            let torque = f * d;
            let hinge_force = (torque / 50) / n; 
            let fs = (f === 0) ? 99 : 40 / hinge_force; 

            let status = updateUI('to-load-val', f + " kg", 'to-result', 'to-bar', fs,
                `✅ 鉸鏈安全`,
                `⚠️ 單一鉸鏈承載約 ${Math.round(hinge_force)} kg`,
                `❌ 鉸鏈崩裂！`
            );
            document.getElementById('to-width-val').innerText = d + " mm";
            document.getElementById('to-num-val').innerText = n + " 個";

            // 動畫更新
            const door = document.getElementById('torsion-door');
            const hingeDot = document.getElementById('torsion-hinge');
            
            let rotation = (f / 50) * 15; // 門片因受力微幅下垂變形
            door.style.transform = `rotate(${rotation}deg)`;
            
            if(status === 'safe') {
                hingeDot.style.background = '#ccc';
                hingeDot.style.boxShadow = 'none';
            } else if (status === 'warn') {
                hingeDot.style.background = '#FFC107';
                hingeDot.style.boxShadow = '0 0 10px #FFC107';
            } else {
                hingeDot.style.background = '#F44336';
                hingeDot.style.boxShadow = '0 0 15px #F44336';
                door.style.transform = `rotate(${rotation + 20}deg) translateX(5px)`; // 斷裂脫落
            }
        }

        // 6. 衝擊力動畫與邏輯
        function updateImpactData() {
            let k = parseFloat(document.getElementById('i-mat').value);
            let m = parseFloat(document.getElementById('i-load').value);
            let h = parseFloat(document.getElementById('i-height').value);
            document.getElementById('i-load-val').innerText = m + " kg";
            document.getElementById('i-height-val').innerText = h + " cm";
            
            let static_def = 0.5 * (15/k); 
            let dynamic_factor = (h === 0) ? 1 : 1 + Math.sqrt(1 + (2 * h) / static_def);
            let peak_force = m * dynamic_factor;
            let fs = 150 / peak_force; 

            let status = updateUI('i-height-val', h + " cm", 'i-result', 'i-bar', fs * 1.5,
                `✅ 準備就緒 (預計峰值: ${Math.round(peak_force)}kg)`,
                `⚠️ 準備就緒 (預計有表面凹陷)`,
                `❌ 準備就緒 (預計發生斷裂！)`
            );
            return status;
        }

        function triggerImpact() {
            let status = updateImpactData();
            const ball = document.getElementById('impact-ball');
            const plank = document.getElementById('impact-plank');
            
            // 重置動畫
            ball.style.animation = 'none';
            plank.style.animation = 'none';
            plank.style.background = 'var(--wood-light)';
            
            // 觸發重繪 (Reflow)
            void ball.offsetWidth; 
            
            // 根據狀態設定掉落幅度
            let h = parseFloat(document.getElementById('i-height').value);
            if (h === 0) return; // 高度為0不掉落

            // 設定動畫時間 (隨高度微調)
            let animTime = 0.5 + (h / 100);
            ball.style.animation = `dropAnim ${animTime}s ease-in-out`;
            
            // 板材反應動畫 (延遲至球體碰到)
            setTimeout(() => {
                if(status === 'danger') {
                    plank.style.background = '#F44336';
                    plank.style.transform = 'scaleY(0.5) translateY(20px)'; // 砸斷
                } else {
                    plank.style.animation = `plankBendAnim 0.3s ease-out`;
                }
            }, (animTime * 0.5 * 1000)); // 取掉落動畫 50% 觸碰點的時間
        }

        // 頁面載入初始化
        window.onload = function() {
            calcPressure(); calcBending(); calcShear();
            calcTension(); calcTorsion(); updateImpactData();
        };
    </script>
</body>
</html>
